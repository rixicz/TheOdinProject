<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        function getComputerChoice() {
            let num = Math.random()
            let choice;
            
            if (num >= 0 && num < 1/3) {
                choice = "rock"
            } else if (num >= 1/3 && num < 2/3) {
                choice = "paper"
            } else {
                choice = "scissors"
            }
            
            return choice
        }

        function playRound(player, computer) {
            
            let result;
            if (player === computer) {
                result = "Draw"
            } else if (player === "scissors") {
                if (computer === "rock") {
                    result = "Computer won"
                } else {
                    result = "You won"
                }
            } else if (player === "paper") {
                if (computer === "rock") {
                    result = "You won"
                } else {
                    result = "Computer won"
                }
            } else if (player === "rock") {
                if (computer === "paper") {
                    result = "Computer won"
                } else {
                    result = "You won"
                }
            } else {
                result = "You did not type in a valid option. Please, try again."
            }
            console.log(result)
            return result
        }   

        function playGame() {
            
            let playerWins = 0
            let computerWins = 0
            let whoWon;
            
            for (let i = 1; i <= 5; i++) {
                
                let humanChoice = (prompt("Type rock, paper or scissors: ")).toLowerCase()
                let computerChoice = getComputerChoice()
                console.log("Computer chose: " + computerChoice)
                let msg = playRound(humanChoice, computerChoice)
                try {
                    if ("You" in msg) {
                        playerWins += 1
                    }
                } catch {
                    computerWins += 1
                }
            }

            if (playerWins > computerWins) {
                whoWon = "You won the game!"
            } else {
                whoWon = "Computer won. Better luck next time."
            }
            return whoWon
        }
        console.log(playGame())
    </script>
</body>
</html>
